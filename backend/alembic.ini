# Alembic 配置文件

[alembic]
# 迁移脚本存放路径
script_location = alembic

# 模板路径（用于生成迁移脚本）
# file_template = %%(rev)s_%%(slug)s

# 时区（用于 create_date 时间戳）
timezone = Asia/Shanghai

# 最大文件名长度
# truncate_slug_length = 40

# sqlalchemy.url 留空，在 env.py 中通过 settings.DATABASE_URL 动态配置
sqlalchemy.url =

# 是否在输出中显示修订信息
# output_encoding = utf-8

[post_write_hooks]
# 后处理钩子（可选）
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79 REVISION_SCRIPT_FILENAME

# 日志配置
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
