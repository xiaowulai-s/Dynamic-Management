    <style id="theme-vars">
/* ============================================================
   方案 D · 清新自然风 (Fresh Natural)
   设计理念：柔白背景 + 森林绿主色；圆润柔和、友好亲和；
   大圆角、柔和阴影、有机形态，像消费级健康/环保产品后台。
   适合：面向一线工程师、强调易用与温度的设备管家。
   ============================================================ */
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap');

:root {
  /* —— 品牌主色：森林绿（单一色相）—— */
  --primary-50:  #F0FDF4;
  --primary-100: #DCFCE7;
  --primary-300: #86EFAC;
  --primary-500: #2F855A;
  --primary-600: #276749;
  --primary-700: #22543D;

  /* —— 暖中性阶 —— */
  --sage-50:  #FDFCF8;
  --sage-100: #F6F7F3;
  --sage-200: #EAF0EA;
  --sage-300: #D7E2D8;
  --sage-400: #A8BCAB;
  --sage-500: #5C7268;
  --sage-700: #38503F;

  /* —— 语义别名（prefixless）—— */
  --background: #FDFCF8;
  --foreground: #1F2A24;
  --card: #FFFFFF;
  --card-foreground: #1F2A24;
  --popover: #FFFFFF;
  --popover-foreground: #1F2A24;
  --primary: #2F855A;
  --primary-foreground: #FFFFFF;
  --secondary: #EAF0EA;
  --secondary-foreground: #38503F;
  --muted: #F6F7F3;
  --muted-foreground: #5C7268;
  --accent: #E3F6E9;
  --accent-foreground: #276749;
  --destructive: #C53030;
  --destructive-foreground: #FFFFFF;
  --border: #E3EAE4;
  --input: #E3EAE4;
  --ring: #2F855A;

  /* —— 圆角：柔和偏大（不超 16px）—— */
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;

  /* —— 状态色：自然色调 —— */
  --state-success: #2F855A;
  --state-warning: #D69E2E;
  --state-error:   #C53030;
  --state-info:    #319795;

  /* —— 图表色：自然色系 —— */
  --chart-1: #2F855A;
  --chart-2: #38B2AC;
  --chart-3: #D69E2E;
  --chart-4: #68A063;
  --chart-5: #8B9D83;

  /* —— 字体：圆润无衬线 —— */
  --font-sans: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', system-ui, sans-serif;
  --font-mono: 'SFMono-Regular', Consolas, monospace;
  --font-serif: var(--font-sans);

  /* —— 阴影：柔和投影，体现亲和 —— */
  --shadow-card: 0 1px 2px rgba(31, 42, 36, 0.04), 0 2px 8px rgba(31, 42, 36, 0.04);
  --shadow-popover: 0 8px 24px rgba(31, 42, 36, 0.10);
  --shadow-drawer: -8px 0 32px rgba(31, 42, 36, 0.10);

  /* —— 间距与密度：中等，宽松舒适 —— */
  --space-page: 24px;
  --space-card: 20px;
  --density: 3;
}

html.light, html {
  color-scheme: light;
}

body {
  font-family: var(--font-sans);
  -webkit-font-smoothing: antialiased;
}

/* 自然风：柔和圆角卡片 */
.card-natural {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-card);
}

/* 叶片状柔和高亮 */
.pill-soft {
  border-radius: 999px;
  padding: 4px 12px;
  background: var(--accent);
  color: var(--accent-foreground);
}

.numeric {
  font-family: var(--font-mono);
  font-variant-numeric: tabular-nums;
}

<body class="min-h-screen font-sans antialiased">
    <main data-viewport-mode="app-shell" class="h-screen overflow-hidden min-h-0 flex" style="background: var(--background);">
      <!-- 侧栏 -->
      <aside class="w-60 flex-shrink-0 flex flex-col" style="background: var(--card); border-right: 1px solid var(--border); box-shadow: 1px 0 8px rgba(31,42,36,0.03);">
        <div class="px-5 py-5 flex items-center gap-3" style="border-bottom: 1px solid var(--border);">

          </div>
        </div>

        <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto no-scrollbar">
          <div class="px-3 pb-1 text-[11px] font-medium tracking-wider uppercase" style="color: var(--muted-foreground);">工作台</div>
          <a class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium cursor-pointer hover:bg-muted" style="color: var(--muted-foreground);">
            <i data-lucide="layout-dashboard" class="w-4 h-4"></i>仪表盘
          </a>
          <a class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium cursor-pointer hover:bg-muted" style="color: var(--muted-foreground);">
            <i data-lucide="cpu" class="w-4 h-4"></i>设备管理
          </a>
          <a class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium" style="background: var(--accent); color: var(--accent-foreground);">
            <i data-lucide="clipboard-list" class="w-4 h-4"></i>日志管理
          </a>
          <a class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium cursor-pointer hover:bg-muted" style="color: var(--muted-foreground);">

          <div class="px-3 pt-4 pb-1 text-[11px] font-medium tracking-wider uppercase" style="color: var(--muted-foreground);">协作</div>

            <span class="ml-auto text-[11px] px-1.5 py-0.5 rounded-md" style="background: var(--muted); color: var(--muted-foreground);">12</span>
          </a>
          <a class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium cursor-pointer hover:bg-muted" style="color: var(--muted-foreground);">
            <i data-lucide="bell" class="w-4 h-4"></i>通知中心
            <span class="ml-auto text-[11px] px-1.5 py-0.5 rounded-md" style="background: var(--accent); color: var(--accent-foreground);">5</span>
          </a>
          <a class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium cursor-pointer hover:bg-muted" style="color: var(--muted-foreground);">
            <i data-lucide="settings" class="w-4 h-4"></i>系统设置
          </a>
        </nav>

        <div class="px-3 py-3" style="border-top: 1px solid var(--border);">
          <div class="flex items-center gap-3 p-2 rounded-xl cursor-pointer hover:bg-muted">
            <div class="w-9 h-9 rounded-full flex items-center justify-center text-sm font-bold" style="background: var(--accent); color: var(--accent-foreground);">张</div>
            <div class="flex-1 min-w-0">

            </div>

          </div>
        </div>
      </aside>

      <!-- 主区 -->
      <div class="flex-1 min-w-0 flex flex-col">
        <header class="h-16 flex-shrink-0 flex items-center justify-between px-6" style="background: var(--card); border-bottom: 1px solid var(--border);">
          <div class="flex items-center gap-3">
            <button data-dom-id="btn-back" class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-sm font-medium cursor-pointer hover:bg-muted" style="color: var(--muted-foreground);">

              返回

            <div class="h-5 w-px" style="background: var(--border);"></div>
            <h1 class="text-lg font-bold" style="color: var(--foreground);">新建日志</h1>
            <span class="pill-soft text-xs">草稿</span>
          </div>
          <div class="flex items-center gap-3">
            <button class="relative w-9 h-9 rounded-xl flex items-center justify-center cursor-pointer hover:bg-muted" style="color: var(--muted-foreground);">

              <span class="absolute top-2 right-2 w-2 h-2 rounded-full" style="background: var(--state-error);"></span>
            </button>
            <div class="w-9 h-9 rounded-full flex items-center justify-center text-sm font-bold cursor-pointer" style="background: var(--accent); color: var(--accent-foreground);">张</div>
          </div>
        </header>

        <div data-scroll-region="primary" class="flex-1 min-h-0 overflow-y-auto p-6">
          <form class="max-w-4xl mx-auto space-y-5" onsubmit="return false;">
            <!-- 基本信息 -->
            <div class="card-natural p-6">
              <div class="flex items-center gap-2 mb-5">
                <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background: var(--primary-50); color: var(--primary);">
                  <i data-lucide="file-text" class="w-4 h-4"></i>
                </div>
                <div>
                  <div class="text-sm font-bold" style="color: var(--foreground);">基本信息</div>
                  <div class="text-xs" style="color: var(--muted-foreground);">日志类型与发生时间</div>
                </div>
              </div>
              <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                  <label class="block text-sm font-medium mb-2" style="color: var(--foreground);">日志类型 <span style="color: var(--state-error);">*</span></label>
                  <select class="w-full px-3 py-2.5 rounded-xl border bg-card text-sm outline-none focus:ring-2 cursor-pointer" style="border-color: var(--border); --tw-ring-color: var(--ring); color: var(--foreground);">

                    <option selected>维修</option>
                    <option>报废</option>

                    <option>保养</option>
                    <option>故障</option>
                    <option>配件</option>
                    <option>校准</option>
                  </select>
                </div>
                <div>
                  <label class="block text-sm font-medium mb-2" style="color: var(--foreground);">发生时间 <span style="color: var(--state-error);">*</span></label>

                </div>
                <div>
                  <label class="block text-sm font-medium mb-2" style="color: var(--foreground);">提交人</label>
                  <div class="flex items-center gap-2 px-3 py-2.5 rounded-xl border" style="background: var(--muted); border-color: var(--border);">
                    <div class="w-6 h-6 rounded-full flex items-center justify-center text-[11px] font-bold" style="background: var(--accent); color: var(--accent-foreground);">张</div>
                    <span class="text-sm" style="color: var(--foreground);">张工</span>
                    <span class="ml-auto text-xs" style="color: var(--muted-foreground);">只读</span>
                  </div>
                </div>
              </div>
            </div>

            <!-- 设备信息 -->
            <div class="card-natural p-6">
              <div class="flex items-center gap-2 mb-5">
                <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background: var(--primary-50); color: var(--primary);">
                  <i data-lucide="cpu" class="w-4 h-4"></i>
                </div>
                <div>
                  <div class="text-sm font-bold" style="color: var(--foreground);">设备信息</div>
                  <div class="text-xs" style="color: var(--muted-foreground);">关联设备与位置</div>
                </div>
              </div>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                  <label class="block text-sm font-medium mb-2" style="color: var(--foreground);">设备 <span style="color: var(--state-error);">*</span></label>
                  <select class="w-full px-3 py-2.5 rounded-xl border bg-card text-sm outline-none focus:ring-2 cursor-pointer" style="border-color: var(--border); --tw-ring-color: var(--ring); color: var(--foreground);">
                    <option>请选择设备</option>
                    <option selected>空压机A-12 (AC-A12-0034)</option>
                    <option>包装机B-07 (PK-B07-0012)</option>
                    <option>输送带C-03 (CV-C03-0056)</option>
                    <option>锅炉D-01 (BL-D01-0008)</option>
                  </select>
                </div>
                <div>
                  <label class="block text-sm font-medium mb-2" style="color: var(--foreground);">设备位置</label>
                  <div class="relative">
                    <i data-lucide="map-pin" class="w-4 h-4 absolute left-3.5 top-1/2 -translate-y-1/2" style="color: var(--muted-foreground);"></i>
                    <input type="text" value="一车间 · A 区 03 工位" class="w-full pl-10 pr-4 py-2.5 rounded-xl border bg-card text-sm outline-none focus:ring-2" style="border-color: var(--border); --tw-ring-color: var(--ring); color: var(--foreground);" placeholder="如：一车间 A 区"/>
                  </div>
                </div>
              </div>
            </div>

            <!-- 处理详情 -->
            <div class="card-natural p-6">
              <div class="flex items-center gap-2 mb-5">
                <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background: var(--primary-50); color: var(--primary);">
                  <i data-lucide="wrench" class="w-4 h-4"></i>
                </div>
                <div>
                  <div class="text-sm font-bold" style="color: var(--foreground);">处理详情</div>
                  <div class="text-xs" style="color: var(--muted-foreground);">故障描述、处理过程与配件</div>
                </div>
              </div>

              <div class="space-y-4">
                <div>
                  <label class="block text-sm font-medium mb-2" style="color: var(--foreground);">故障/情况描述 <span style="color: var(--state-error);">*</span></label>
                  <textarea rows="3" class="w-full px-3 py-2.5 rounded-xl border bg-card text-sm outline-none focus:ring-2 resize-none" style="border-color: var(--border); --tw-ring-color: var(--ring); color: var(--foreground);" placeholder="请描述故障现象或巡检发现的问题…">设备运行过程中出现压力异常报警，排气压力低于设定值 0.65MPa。</textarea>
                </div>
                <div>
                  <label class="block text-sm font-medium mb-2" style="color: var(--foreground);">处理过程</label>
                  <textarea rows="4" class="w-full px-3 py-2.5 rounded-xl border bg-card text-sm outline-none focus:ring-2 resize-none" style="border-color: var(--border); --tw-ring-color: var(--ring); color: var(--foreground);" placeholder="请描述具体的处理步骤…">1. 停机断电，泄放系统压力；2. 拆卸进气阀组件检查；3. 更换进气阀组件，清理冷却器。</textarea>
                </div>

                <!-- 更换配件动态列表 -->
                <div>
                  <div class="flex items-center justify-between mb-2">
                    <label class="block text-sm font-medium" style="color: var(--foreground);">更换配件</label>
                    <button type="button" class="inline-flex items-center gap-1 text-xs font-medium cursor-pointer hover:underline" style="color: var(--primary);">
                      <i data-lucide="plus" class="w-3.5 h-3.5"></i>添加配件
                    </button>
                  </div>
                  <div class="space-y-2">
                    <div class="grid grid-cols-12 gap-2 items-center">
                      <input type="text" value="进气阀组件" class="col-span-7 px-3 py-2 rounded-xl border bg-card text-sm outline-none focus:ring-2" style="border-color: var(--border); --tw-ring-color: var(--ring); color: var(--foreground);" placeholder="配件名称"/>
                      <div class="col-span-4 relative">
                        <input type="number" value="1" min="1" class="w-full pl-3 pr-8 py-2 rounded-xl border bg-card text-sm outline-none focus:ring-2 numeric" style="border-color: var(--border); --tw-ring-color: var(--ring); color: var(--foreground);"/>
                        <span class="absolute right-3 top-1/2 -translate-y-1/2 text-xs" style="color: var(--muted-foreground);">件</span>
                      </div>
                      <button type="button" class="col-span-1 w-8 h-8 rounded-lg flex items-center justify-center cursor-pointer hover:bg-muted mx-auto" style="color: var(--state-error);">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                      </button>
                    </div>
                    <div class="grid grid-cols-12 gap-2 items-center">
                      <input type="text" value="密封圈" class="col-span-7 px-3 py-2 rounded-xl border bg-card text-sm outline-none focus:ring-2" style="border-color: var(--border); --tw-ring-color: var(--ring); color: var(--foreground);" placeholder="配件名称"/>
                      <div class="col-span-4 relative">
                        <input type="number" value="4" min="1" class="w-full pl-3 pr-8 py-2 rounded-xl border bg-card text-sm outline-none focus:ring-2 numeric" style="border-color: var(--border); --tw-ring-color: var(--ring); color: var(--foreground);"/>
                        <span class="absolute right-3 top-1/2 -translate-y-1/2 text-xs" style="color: var(--muted-foreground);">件</span>
                      </div>
                      <button type="button" class="col-span-1 w-8 h-8 rounded-lg flex items-center justify-center cursor-pointer hover:bg-muted mx-auto" style="color: var(--state-error);">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <!-- 附件 -->
            <div class="card-natural p-6">
              <div class="flex items-center gap-2 mb-5">
                <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background: var(--primary-50); color: var(--primary);">
                  <i data-lucide="paperclip" class="w-4 h-4"></i>
                </div>
                <div>
                  <div class="text-sm font-bold" style="color: var(--foreground);">附件上传</div>
                  <div class="text-xs" style="color: var(--muted-foreground);">现场照片、维修记录单等</div>
                </div>
              </div>
              <div class="rounded-2xl border-2 border-dashed p-8 flex flex-col items-center justify-center gap-3 cursor-pointer transition hover:bg-muted" style="border-color: var(--border);">
                <div class="w-12 h-12 rounded-2xl flex items-center justify-center" style="background: var(--primary-50); color: var(--primary);">
                  <i data-lucide="upload-cloud" class="w-6 h-6"></i>
                </div>
                <div class="text-center">
                  <div class="text-sm font-medium" style="color: var(--foreground);">点击或拖拽文件到此处上传</div>
                  <div class="text-xs mt-1" style="color: var(--muted-foreground);">支持 JPG / PNG / PDF / DOCX，单个文件不超过 20MB</div>
                </div>
              </div>

              <div class="mt-4">
                <label class="block text-sm font-medium mb-2" style="color: var(--foreground);">备注</label>
                <textarea rows="2" class="w-full px-3 py-2.5 rounded-xl border bg-card text-sm outline-none focus:ring-2 resize-none" style="border-color: var(--border); --tw-ring-color: var(--ring); color: var(--foreground);" placeholder="补充说明（选填）"></textarea>
              </div>
            </div>

            <!-- 底部操作栏 -->
            <div class="card-natural p-4 flex items-center justify-between sticky bottom-0">
              <div class="flex items-center gap-2 text-xs" style="color: var(--muted-foreground);">
                <i data-lucide="info" class="w-3.5 h-3.5"></i>
                <span>带 <span style="color: var(--state-error);">*</span> 为必填项</span>
              </div>
              <div class="flex items-center gap-3">
                <button type="button" class="inline-flex items-center gap-1.5 px-5 py-2.5 rounded-xl text-sm font-medium cursor-pointer transition hover:bg-muted" style="border: 1px solid var(--border); color: var(--foreground);">
                  <i data-lucide="save" class="w-4 h-4"></i>
                  保存草稿
                </button>
                <button type="submit" class="inline-flex items-center gap-1.5 px-5 py-2.5 rounded-xl text-sm font-medium cursor-pointer transition hover:opacity-90" style="background: var(--primary); color: var(--primary-foreground); box-shadow: var(--shadow-card);">
                  <i data-lucide="send" class="w-4 h-4"></i>
                  提交审核
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
