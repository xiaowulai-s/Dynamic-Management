<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录页 · 现代简约</title>
    <style id="theme-vars">
/* ============================================================
   方案 A · 现代简约风 (Modern Minimal)
   设计理念：克制、理性、留白；单一品牌主色 + 中性灰阶；
   细线分隔、无阴影静态卡片、紧凑理性的信息层级。
   适合：注重效率与信息密度的企业内网后台。
   ============================================================ */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap');

:root {
  /* —— 品牌主色：石板蓝（单一色相，仅明度阶）—— */
  --primary-50:  #EFF6FF;
  --primary-100: #DBEAFE;
  --primary-500: #3B82F6;
  --primary-600: #2563EB;
  --primary-700: #1D4ED8;

  /* —— 中性灰阶 —— */
  --gray-50:  #F8FAFC;
  --gray-100: #F1F5F9;
  --gray-200: #E2E8F0;
  --gray-300: #CBD5E1;
  --gray-400: #94A3B8;
  --gray-500: #64748B;
  --gray-600: #475569;
  --gray-700: #334155;
  --gray-900: #0F172A;

  /* —— 语义别名（prefixless，供 fill-html-head 映射）—— */
  --background: #F8FAFC;
  --foreground: #0F172A;
  --card: #FFFFFF;
  --card-foreground: #0F172A;
  --popover: #FFFFFF;
  --popover-foreground: #0F172A;
  --primary: #2563EB;
  --primary-foreground: #FFFFFF;
  --secondary: #F1F5F9;
  --secondary-foreground: #334155;
  --muted: #F1F5F9;
  --muted-foreground: #64748B;
  --accent: #EFF6FF;
  --accent-foreground: #1D4ED8;
  --destructive: #DC2626;
  --destructive-foreground: #FFFFFF;
  --border: #E2E8F0;
  --input: #E2E8F0;
  --ring: #2563EB;

  /* —— 圆角：克制偏小 —— */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;

  /* —— 状态色 —— */
  --state-success: #16A34A;
  --state-warning: #D97706;
  --state-error:   #DC2626;
  --state-info:    #2563EB;

  /* —— 图表色（主色阶 + 中性）—— */
  --chart-1: #2563EB;
  --chart-2: #60A5FA;
  --chart-3: #93C5FD;
  --chart-4: #64748B;
  --chart-5: #CBD5E1;

  /* —— 字体 —— */
  --font-sans: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace;
  --font-serif: var(--font-sans);

  /* —— 阴影：静态卡片不投影，仅浮层使用 —— */
  --shadow-card: none;
  --shadow-popover: 0 4px 12px rgba(15, 23, 42, 0.08);
  --shadow-drawer: -8px 0 24px rgba(15, 23, 42, 0.10);

  /* —— 间距与密度 —— */
  --space-page: 24px;
  --space-card: 20px;
  --density: 3;
}

html.light, html {
  color-scheme: light;
}

body {
  font-family: var(--font-sans);
  font-feature-settings: 'cv11', 'ss01';
  letter-spacing: -0.005em;
}

/* 简约风：细线分隔的卡片，无投影 */
.card-minimal {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-card);
}

/* 等宽数字用于 KPI */
.numeric {
  font-family: var(--font-mono);
  font-variant-numeric: tabular-nums;
}

    </style>

<body class="min-h-screen font-sans antialiased">
    <main class="min-h-screen flex flex-col items-center justify-center px-4 py-10 bg-background">
      <div class="w-full max-w-5xl">
        <div class="overflow-hidden grid grid-cols-1 md:grid-cols-2 rounded-lg border border-border bg-card">
          <!-- 左侧品牌区 -->
          <div class="relative p-10 flex flex-col justify-between min-h-[560px] text-white overflow-hidden" style="background: linear-gradient(135deg, #2563EB 0%, #1D4ED8 100%);">
            <!-- 极淡网格纹理装饰（克制几何） -->
            <div class="absolute inset-0 pointer-events-none opacity-[0.12]" style="background-image: linear-gradient(rgba(255,255,255,0.7) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.7) 1px, transparent 1px); background-size: 28px 28px;"></div>
            <!-- 几何方块点缀 -->
            <div class="absolute top-10 right-10 w-16 h-16 pointer-events-none" style="border: 1px solid rgba(255,255,255,0.25);"></div>
            <div class="absolute top-14 right-14 w-6 h-6 pointer-events-none" style="background: rgba(255,255,255,0.18);"></div>
            <div class="absolute bottom-24 right-12 w-3 h-3 pointer-events-none" style="background: rgba(255,255,255,0.3);"></div>

            <!-- 顶部 logo + 系统名 -->
            <div class="relative flex items-center gap-2.5">
              <div class="w-9 h-9 rounded-md bg-white/15 flex items-center justify-center">
                <i data-lucide="activity" class="w-5 h-5"></i>
              </div>
              <span class="text-[15px] font-semibold tracking-tight">设备信息动态管理系统</span>
            </div>

            <!-- 中部大标题 + slogan -->
            <div class="relative">
              <h1 class="text-[28px] font-semibold leading-tight mb-3">设备全生命周期<br>日志管理</h1>
              <p class="text-sm text-white/80 leading-relaxed max-w-[300px]">面向现场工程师与管理员的内网效率工具，覆盖安装到报废的全过程记录与审核。</p>
            </div>

            <!-- 底部 3 个特性条目（简洁细线列表样式） -->
            <ul class="relative space-y-2.5">
              <li class="flex items-center gap-3 px-3 py-2.5 rounded-md" style="background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.18);">
                <div class="w-7 h-7 rounded-md flex items-center justify-center flex-shrink-0" style="background: rgba(255,255,255,0.18);">
                  <i data-lucide="check" class="w-4 h-4"></i>
                </div>
                <span class="text-sm font-medium">8 类设备日志标准化录入与审核流程</span>
              </li>
              <li class="flex items-center gap-3 px-3 py-2.5 rounded-md" style="background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.18);">
                <div class="w-7 h-7 rounded-md flex items-center justify-center flex-shrink-0" style="background: rgba(255,255,255,0.18);">
                  <i data-lucide="activity" class="w-4 h-4"></i>
                </div>
                <span class="text-sm font-medium">设备状态与日志数据实时可视化</span>
              </li>
              <li class="flex items-center gap-3 px-3 py-2.5 rounded-md" style="background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.18);">
                <div class="w-7 h-7 rounded-md flex items-center justify-center flex-shrink-0" style="background: rgba(255,255,255,0.18);">
                  <i data-lucide="shield-check" class="w-4 h-4"></i>
                </div>
                <span class="text-sm font-medium">角色权限与审批留痕，内网安全部署</span>
              </li>
            </ul>
          </div>

          <!-- 右侧表单区 -->
          <div class="p-10 flex flex-col justify-center bg-card">
            <!-- 欢迎语标题 + 副标题 -->
            <div class="mb-7">
              <h2 class="text-xl font-semibold mb-1 text-foreground">欢迎登录</h2>
              <p class="text-sm text-muted-foreground">请输入您的账号信息以继续</p>
            </div>

            <form class="space-y-4" onsubmit="return false;">
              <!-- 用户名输入（带图标） -->
              <div>
                <label class="block text-sm font-medium mb-1.5 text-foreground">用户名</label>
                <div class="relative">
                  <i data-lucide="user" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-muted-foreground"></i>
                  <input type="text" autocomplete="username" placeholder="请输入用户名" class="w-full h-10 pl-10 pr-3 text-sm border border-input rounded-md bg-card text-foreground placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-ring focus:border-ring">
                </div>
              </div>

              <!-- 密码输入（带图标 + 显隐切换） -->
              <div>
                <div class="flex items-center justify-between mb-1.5">
                  <label class="block text-sm font-medium text-foreground">密码</label>
                  <a href="#" class="text-xs text-primary hover:underline">忘记密码？</a>
                </div>
                <div class="relative">
                  <i data-lucide="lock" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-muted-foreground"></i>
                  <input type="password" autocomplete="current-password" placeholder="请输入密码" class="w-full h-10 pl-10 pr-10 text-sm border border-input rounded-md bg-card text-foreground placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-ring focus:border-ring">
                  <i data-lucide="eye-off" class="w-4 h-4 absolute right-3 top-1/2 -translate-y-1/2 text-muted-foreground cursor-pointer"></i>
                </div>
              </div>

              <!-- 记住我 -->
              <label class="flex items-center gap-2 text-sm text-muted-foreground select-none cursor-pointer">
                <input type="checkbox" class="w-4 h-4 rounded border-border" style="accent-color: var(--primary);">
                <span>记住我（7 天内免登录）</span>
              </label>

              <!-- 登录按钮（带图标） -->
              <button data-dom-id="btn-login" type="submit" class="w-full h-10 bg-primary text-primary-foreground rounded-md text-sm font-medium hover:opacity-90 transition-opacity flex items-center justify-center gap-2">
                <span>登录</span>
                <i data-lucide="arrow-right" class="w-4 h-4"></i>
              </button>
            </form>

            <!-- 底部版本/安全信息 -->
            <div class="mt-8 pt-5 flex items-center justify-center gap-1.5 text-xs text-muted-foreground" style="border-top: 1px solid var(--border);">
              <i data-lucide="shield-check" class="w-3.5 h-3.5"></i>
              <span>内网安全传输 · v1.0</span>
            </div>
          </div>
        </div>

        <!-- 底部版权信息 -->
        <div class="mt-6 text-center text-xs text-muted-foreground">
          © 2026 设备信息动态管理系统 · 内网部署 v1.0
        </div>
      </div>
    </main>
    <script>lucide.createIcons();</script>
